<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Viáticos — Control de Proyectos</title>
<meta name="theme-color" content="#0b0f16" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Viáticos" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
/* ============================================================
   TOKENS — Sistema de Viáticos — Tema oscuro
   Dirección: "Libro contable nocturno" — tinta profunda, papel
   oscuro y un dorado tipo sello de cera para la acción principal.
   Los estados (comprobante) usan verde/ámbar/rojo semánticos,
   no un único acento genérico repetido en todo.
   ============================================================ */
:root {
  /* Fondo y superficies — azul-tinta, no negro plano */
  --bg-950: #0b0f16;      /* fondo de la app */
  --bg-900: #10151e;      /* fondo de paneles grandes */
  --surface-800: #161d29; /* tarjetas */
  --surface-700: #1c2431; /* tarjetas elevadas / hover */
  --surface-600: #232c3b; /* inputs, superficies interactivas */
  --line: #2a3444;        /* bordes y reglas finas */
  --line-strong: #38455a;

  /* Texto */
  --text-100: #eef1f2;
  --text-300: #b6c0cc;
  --text-500: #7b8798;

  /* Acento principal — dorado sello de cera (acción primaria) */
  --gold-400: #e8c07a;
  --gold-500: #d4a24f;
  --gold-600: #b8863a;
  --gold-bg: #2b2416;

  /* Estados del comprobante — semánticos */
  --state-ok: #4fb08a;
  --state-ok-bg: #16281f;
  --state-pending: #dda23f;
  --state-pending-bg: #2c2013;
  --state-missing: #e0685f;
  --state-missing-bg: #2c1917;

  --danger: #e0685f;
  --danger-bg: #2c1917;
  --danger-strong: #c94c43;

  --font-display: "Fraunces", "Georgia", serif;
  --font-body: "Inter", -apple-system, "Segoe UI", sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;

  --fs-xs: 0.75rem;
  --fs-sm: 0.8125rem;
  --fs-base: 0.9375rem;
  --fs-md: 1.0625rem;
  --fs-lg: 1.375rem;
  --fs-xl: 1.875rem;
  --fs-2xl: 2.5rem;

  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px;

  --radius-sm: 6px;
  --radius-md: 10px;

  --shadow-card: 0 1px 0 rgba(255,255,255,0.03) inset, 0 6px 20px rgba(0,0,0,0.35);
  --shadow-pop: 0 20px 50px rgba(0,0,0,0.5);

  --sidebar-w: 248px;
  --topbar-h: 64px;
  --bottomnav-h: 64px;

  /* Alias retrocompatibles con nombres usados en los módulos existentes */
  --paper-0: var(--bg-950);
  --paper-50: var(--surface-800);
  --paper-100: var(--surface-700);
  --ink-900: var(--text-100);
  --ink-700: var(--text-100);
  --ink-500: var(--text-300);
  --ledger-700: var(--gold-500);
  --ledger-500: var(--gold-400);
  --ledger-100: var(--gold-bg);
  --stamp-ok: var(--state-ok); --stamp-ok-bg: var(--state-ok-bg);
  --stamp-pending: var(--state-pending); --stamp-pending-bg: var(--state-pending-bg);
  --stamp-missing: var(--state-missing); --stamp-missing-bg: var(--state-missing-bg);
}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-950);
  color: var(--text-100);
  font-family: var(--font-body);
  font-size: var(--fs-base);
  -webkit-tap-highlight-color: transparent;
}

body {
  overscroll-behavior-y: contain;
  background-image:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(212,162,79,0.05), transparent),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(79,176,138,0.04), transparent);
  background-attachment: fixed;
}

button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; }
a { color: inherit; text-decoration: none; }

.tabular { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
.mono { font-family: var(--font-mono); }

:focus-visible {
  outline: 2px solid var(--gold-400);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

/* ---------- Shell ---------- */
#app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-900);
  border-right: 1px solid var(--line);
  color: var(--text-100);
  padding: var(--sp-5) var(--sp-4);
  display: flex;
  flex-direction: column;
  gap: var(--sp-6);
  position: sticky;
  top: 0;
  height: 100vh;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: var(--sp-2);
  padding: 0 var(--sp-2);
}
.brand-mark {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--fs-lg);
  letter-spacing: -0.01em;
  background: linear-gradient(135deg, var(--gold-400), var(--gold-600));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.brand-sub {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--text-500);
  text-transform: uppercase;
}

.nav-group { display: flex; flex-direction: column; gap: 2px; }
.nav-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--text-500);
  text-transform: uppercase;
  padding: var(--sp-2) var(--sp-2) var(--sp-1);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-2);
  border-radius: var(--radius-sm);
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--text-300);
  border-left: 2px solid transparent;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.85; }
.nav-item:hover { background: var(--surface-700); color: var(--text-100); }
.nav-item.active {
  background: var(--gold-bg);
  color: var(--gold-400);
  border-left-color: var(--gold-500);
}

.sidebar-foot {
  margin-top: auto;
  font-size: var(--fs-xs);
  color: var(--text-500);
  padding: 0 var(--sp-2);
}

.main-col { display: flex; flex-direction: column; min-height: 100vh; }

.topbar {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp-6);
  border-bottom: 1px solid var(--line);
  background: var(--bg-900);
  position: sticky;
  top: 0;
  z-index: 5;
}
.topbar-miga {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  color: var(--text-300);
}
.topbar-marca {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-500);
}
.topbar-actions { display: flex; gap: var(--sp-3); align-items: center; }

.view { padding: var(--sp-6); flex: 1; }

/* ---------- Botones — cada acción se entiende por su color ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  font-size: var(--fs-sm);
  font-weight: 600;
  white-space: nowrap;
  transition: filter 0.12s ease, transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
}
.btn:active { transform: translateY(1px); }

/* Red de seguridad: cualquier ícono SVG dentro de un botón o enlace-botón que no
   tenga ya un tamaño explícito (nav, kpi, etc.) recibe un tamaño razonable por
   defecto. Sin esto, un <svg> sin width/height se renderiza a 300x150px por
   defecto del navegador — enorme e invisible/roto en botones pequeños. */
.btn svg, button svg, a.btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  vertical-align: middle;
}
.gasto-row .acciones button svg { width: 18px; height: 18px; }

/* Primaria — dorado sello, para crear / guardar / avanzar */
.btn-primary {
  background: linear-gradient(180deg, var(--gold-400), var(--gold-500));
  color: #1c1406;
  box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 4px 14px rgba(212,162,79,0.18);
}
.btn-primary:hover { filter: brightness(1.08); }

/* Secundaria — contorno neutro, para acciones sin riesgo (cancelar, editar) */
.btn-secondary { background: var(--surface-700); border-color: var(--line-strong); color: var(--text-100); }
.btn-secondary:hover { border-color: var(--gold-500); }

/* Ghost — navegación terciaria */
.btn-ghost { background: transparent; color: var(--text-300); }
.btn-ghost:hover { color: var(--text-100); background: var(--surface-700); }

/* Éxito — confirmar, cerrar viático correctamente */
.btn-success { background: var(--state-ok-bg); color: var(--state-ok); border-color: rgba(79,176,138,0.35); }
.btn-success:hover { background: rgba(79,176,138,0.18); }

/* Advertencia — acciones con pendientes (revisar antes de cerrar) */
.btn-warning { background: var(--state-pending-bg); color: var(--state-pending); border-color: rgba(221,162,63,0.35); }
.btn-warning:hover { background: rgba(221,162,63,0.18); }

/* Peligro — eliminar */
.btn-danger { background: var(--danger-bg); color: var(--danger); border-color: rgba(224,104,95,0.35); }
.btn-danger:hover { background: rgba(224,104,95,0.2); }

.btn-sm { padding: var(--sp-2) var(--sp-3); font-size: var(--fs-xs); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

/* ---------- Tarjetas ---------- */
.card {
  background: var(--surface-800);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: var(--sp-5);
}
.card-elevated {
  background: var(--surface-700);
  box-shadow: var(--shadow-card);
  border-color: var(--line-strong);
}

/* ---------- Estampas de estado (elemento distintivo — sello foliado) ---------- */
.stamp {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  font-weight: 600;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 3px;
  border: 1.5px solid currentColor;
}
.stamp::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }
.stamp-ok { color: var(--state-ok); background: var(--state-ok-bg); }
.stamp-pending { color: var(--state-pending); background: var(--state-pending-bg); }
.stamp-missing { color: var(--state-missing); background: var(--state-missing-bg); }

/* ---------- Formularios ---------- */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: var(--fs-xs); font-weight: 600; color: var(--text-500); text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field select, .field textarea {
  padding: var(--sp-3);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-600);
  color: var(--text-100);
  font-size: 16px; /* nunca menor a 16px: si no, iOS hace zoom automático al tocar el campo y a veces se queda así */
}
.field input::placeholder, .field textarea::placeholder { color: var(--text-500); }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold-500); }
.field-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--sp-4); }

/* ---------- Modal ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(4,6,10,0.7);
  backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; padding: var(--sp-4);
}
.modal {
  background: var(--surface-800);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-md);
  width: 100%; max-width: 480px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-pop);
  overflow: hidden;
}
.modal h2 {
  font-family: var(--font-display); font-size: var(--fs-md);
  padding: var(--sp-5) var(--sp-5) 0;
  flex-shrink: 0;
}
.modal-body {
  padding: var(--sp-3) var(--sp-5);
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.modal-actions {
  display: flex; justify-content: flex-end; gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  border-top: 1px solid var(--line);
  flex-shrink: 0;
}

/* ---------- Toast ---------- */
#toast-region {
  position: fixed; bottom: var(--sp-5); right: var(--sp-5);
  display: flex; flex-direction: column; gap: var(--sp-2); z-index: 60;
}
.toast {
  background: var(--surface-700); color: var(--text-100);
  border: 1px solid var(--line-strong);
  padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-sm);
  font-size: var(--fs-sm); box-shadow: var(--shadow-pop);
}

/* ---------- Mobile nav ---------- */
.bottom-nav { display: none; }

@media (max-width: 860px) {
  #app-shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .view { padding: var(--sp-4); padding-bottom: calc(var(--bottomnav-h) + var(--sp-4)); }
  .topbar { padding: 0 var(--sp-4); }
  .field-row { grid-template-columns: 1fr; }

  .bottom-nav {
    display: flex;
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bottomnav-h);
    background: var(--bg-900);
    border-top: 1px solid var(--line);
    z-index: 40;
  }
  .bottom-nav-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    font-size: 0.65rem; font-weight: 600; color: var(--text-500);
  }
  .bottom-nav-item svg { width: 20px; height: 20px; }
  .bottom-nav-item.active { color: var(--gold-400); }
  .bottom-nav-item.fab {
    background: linear-gradient(180deg, var(--gold-400), var(--gold-500));
    color: #1c1406;
    border-radius: 50%; width: 48px; height: 48px;
    margin-top: -24px; box-shadow: 0 4px 16px rgba(212,162,79,0.35);
    justify-content: center;
  }
  .bottom-nav-item.fab span { display: none; }
}
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-4);
  margin-bottom: var(--sp-6);
}
@media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .kpi-grid { grid-template-columns: 1fr; } }

.kpi-card {
  background: var(--paper-100);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: var(--sp-4) var(--sp-5);
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
}
.kpi-icon {
  position: absolute; top: var(--sp-4); right: var(--sp-4);
  width: 20px; height: 20px; color: var(--line-strong);
  opacity: 0.6;
}
.kpi-icon svg { width: 100%; height: 100%; }
.kpi-label {
  font-family: var(--font-mono);
  font-size: 0.65rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink-500);
  padding-right: 24px;
}
.kpi-value {
  font-family: var(--font-display);
  font-size: var(--fs-2xl);
  font-weight: 600;
  letter-spacing: -0.01em;
}
.kpi-value.small { font-size: var(--fs-xl); }
.kpi-sub { font-size: var(--fs-xs); color: var(--ink-500); }
.kpi-card.accent-danger .kpi-value { color: var(--danger); }
.kpi-card.accent-ledger .kpi-value { color: var(--ledger-700); }
.kpi-card.accent-success .kpi-value { color: var(--state-ok); }

.dash-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: var(--sp-5);
}
@media (max-width: 1100px) { .dash-grid { grid-template-columns: 1fr; } }

.section-title {
  font-family: var(--font-display);
  font-size: var(--fs-md);
  font-weight: 600;
  margin-bottom: var(--sp-4);
  padding-bottom: var(--sp-3);
  padding-left: 10px;
  border-bottom: 1px solid var(--line);
  border-left: 3px solid var(--gold-500);
  display: flex; align-items: center; justify-content: space-between;
}

.proj-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--line);
}
.proj-row:last-child { border-bottom: none; }
.proj-name { font-weight: 600; font-size: var(--fs-sm); }
.proj-meta { font-size: var(--fs-xs); color: var(--ink-500); }

.empty-state {
  text-align: center;
  padding: var(--sp-7) var(--sp-4);
  color: var(--ink-500);
}
.empty-state .lead { font-family: var(--font-display); font-size: var(--fs-md); color: var(--ink-900); margin-bottom: var(--sp-2); }
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-5); gap: var(--sp-3); flex-wrap: wrap;
}
.toolbar-filters { display: flex; gap: var(--sp-2); flex-wrap: wrap; }

.chip {
  padding: 6px 12px; border-radius: 999px;
  border: 1px solid var(--line); font-size: var(--fs-xs); font-weight: 600;
  color: var(--ink-500); background: var(--paper-100);
}
.chip.active { background: var(--gold-bg); color: var(--gold-400); border-color: var(--gold-500); }

.proj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--sp-4);
}

.proj-card {
  background: var(--paper-100);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: var(--sp-4);
  display: flex; flex-direction: column; gap: var(--sp-3);
  cursor: pointer;
  transition: border-color 0.15s ease;
}
.proj-card:hover { border-color: var(--ink-500); }

.proj-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--sp-2); }
.proj-card-title { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-md); }
.proj-card-client { font-size: var(--fs-xs); color: var(--ink-500); }

.state-tag {
  font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 3px; font-weight: 700;
  flex-shrink: 0;
}
.state-planificado { background: var(--surface-600); color: var(--text-300); }
.state-activo { background: var(--stamp-ok-bg); color: var(--stamp-ok); }
.state-finalizado { background: #201a30; color: #a89bd6; }
.state-archivado { background: var(--surface-600); color: var(--text-500); }

.proj-card-metrics { display: flex; gap: var(--sp-5); }
.proj-card-metric .num { font-family: var(--font-mono); font-weight: 600; font-size: var(--fs-sm); }
.proj-card-metric .lbl { font-size: 0.65rem; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.04em; }

.detail-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: var(--sp-5); gap: var(--sp-4); flex-wrap: wrap;
}
.detail-title { font-family: var(--font-display); font-size: var(--fs-xl); font-weight: 600; }
.detail-meta { display: flex; gap: var(--sp-4); flex-wrap: wrap; margin-top: var(--sp-2); font-size: var(--fs-sm); color: var(--ink-500); }
.detail-actions { display: flex; gap: var(--sp-2); flex-wrap: wrap; }

.tabs { display: flex; gap: var(--sp-2); border-bottom: 1px solid var(--line); margin-bottom: var(--sp-5); }
.tab-btn {
  padding: var(--sp-3) var(--sp-2); font-size: var(--fs-sm); font-weight: 600;
  color: var(--ink-500); border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab-btn.active { color: var(--ink-900); border-bottom-color: var(--ledger-700); }
.comprobante-preview {
  width: 100%;
  max-width: 480px;
  max-height: 70vh;
  object-fit: contain;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line-strong);
  display: block;
  background: #fff;
}

.deteccion-card {
  background: var(--surface-600);
  border: 1px dashed var(--gold-500);
  border-radius: var(--radius-sm);
  padding: var(--sp-4);
  margin-top: var(--sp-3);
}
.deteccion-card h3 {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold-400);
  margin-bottom: var(--sp-3);
}
.deteccion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--sp-3); }

    const estadoEl = contenedor.querySelector('#captura-estado');

  function filaEquipo(p = {}) {

  }
  function filaExterno(p = {}) {
    const id = p.id || generarId('ext');
    return { id, nombre: p.nombre || '', diasNecesarios: p.diasNecesarios ?? 0, costoPorDia: p.costoPorDia ?? 0 };
  }

    const modal = abrirModal({

      contenidoHtml: `

      `,
      botones: [
        { texto: 'Cancelar', clase: 'btn-secondary' },
        { texto: 'Guardar', clase: 'btn-secondary', cerrar: false, onClick: async () => { await guardarDatos2(); mostrarToast('Solicitud guardada.'); } },

          texto: 'Guardar y generar PDF', clase: 'btn-primary', cerrar: false,

            const guardado = await guardarDatos2();
            const html = construirHTMLPersonal(proyecto, guardado, config);
            const totalEquipo = guardado.equipo.reduce((a, p) => a + (p.tarifaAlimentacionDia * diasEntre(p.fechaInicio, p.fechaFin)) + p.moviViaje + p.moviInterna, 0);
            const totalExterno = guardado.externos.reduce((a, p) => a + (p.diasNecesarios * p.costoPorDia), 0);

        </div>
      `;
    }

    function repintar() {
      modal.querySelector('#s2-equipo').innerHTML = equipo.map(filaEquipoHTML).join('');
      modal.querySelector('#s2-externos').innerHTML = externos.map(filaExternoHTML).join('');
      wireFilas();
      actualizarResultado();
    }

    function leerFilaEquipo(el) {
      return {
        id: el.dataset.filaEquipo,
        nombre: el.querySelector('.eq-nombre').value,
        cargo: el.querySelector('.eq-cargo').value,
        fechaInicio: el.querySelector('.eq-inicio').value,
        fechaFin: el.querySelector('.eq-fin').value,
        hospedaje: el.querySelector('.eq-hospedaje').value,
        tarifaAlimentacionDia: Number(el.querySelector('.eq-alim').value) || 0,
        moviViaje: Number(el.querySelector('.eq-movi').value) || 0,
        moviInterna: Number(el.querySelector('.eq-movint').value) || 0,
      };
    }
    function leerFilaExterno(el) {
      return {
        id: el.dataset.filaExterno,
        nombre: el.querySelector('.ex-nombre').value,
        diasNecesarios: Number(el.querySelector('.ex-dias').value) || 0,
        costoPorDia: Number(el.querySelector('.ex-costo').value) || 0,
      };
    }

    function sincronizarDesdeD0M() {
      equipo = Array.from(modal.querySelectorAll('[data-fila-equipo]')).map(leerFilaEquipo);
      externos = Array.from(modal.querySelectorAll('[data-fila-externo]')).map(leerFilaExterno);
    }

    function actualizarResultado() {
      sincronizarDesdeD0M();
      const subtotalesEquipo = equipo.map((p) => (p.tarifaAlimentacionDia * diasEntre(p.fechaInicio, p.fechaFin)) + p.moviViaje + p.moviInterna);
      const totalEquipo = subtotalesEquipo.reduce((a, v) => a + v, 0);
      const totalExterno = externos.reduce((a, p) => a + (p.diasNecesarios * p.costoPorDia), 0);
      const total = totalEquipo + totalExterno;
      modal.querySelector('#s2-resultado').innerHTML = `
        <h3>Total</h3>
        <p style="font-size:var(--fs-sm);">Equipo propio: ${formatoMoneda(totalEquipo)} · Personal externo: ${formatoMoneda(totalExterno)}<br>
        <strong style="font-size:var(--fs-md);">Total solicitado: ${formatoMoneda(total)}</strong></p>
      `;
    }

    function wireFilas() {
      modal.querySelectorAll('input, select').forEach((el) => el.addEventListener('input', actualizarResultado));
      modal.querySelectorAll('.eq-eliminar').forEach((btn) => btn.addEventListener('click', () => {
        const id = btn.closest('[data-fila-equipo]').dataset.filaEquipo;
        equipo = equipo.filter((p) => p.id !== id);
        repintar();
      }));
      modal.querySelectorAll('.ex-eliminar').forEach((btn) => btn.addEventListener('click', () => {
        const id = btn.closest('[data-fila-externo]').dataset.filaExterno;
        externos = externos.filter((p) => p.id !== id);
        repintar();
      }));
    }

    modal.querySelector('#s2-add-equipo').addEventListener('click', () => {
      sincronizarDesdeD0M();
      equipo.push(filaEquipo({ fechaInicio: proyecto.fechaInicio, fechaFin: proyecto.fechaFinEstimada, tarifaAlimentacionDia: config.tarifaAlimentacionPersonal ?? 20 }));
      repintar();
    });
    modal.querySelector('#s2-add-externo').addEventListener('click', () => {
      sincronizarDesdeD0M();
      externos.push(filaExterno());
      repintar();
    });

    async function guardarDatos2() {
      sincronizarDesdeD0M();
      return guardarSolicitud(proyecto.id, 'personal', { equipo, externos });
    }

    repintar();
  }

  async function abrirSolicitudFormal({ proyecto, onGuardado }) {
    const config = await obtenerEmpresa();
    const previa = await obtenerSolicitud(proyecto.id, 'formal');

    // Suma los totales de las otras dos solicitudes (si existen) para sugerir el monto
    const [solJefe, solPersonal] = await Promise.all([
      obtenerSolicitud(proyecto.id, 'jefe'),
      obtenerSolicitud(proyecto.id, 'personal'),
    ]);
    let sugerido = 0;
    if (solJefe) sugerido += (solJefe.tarifaAlimentacionDia * diasEntre(solJefe.fechaInicio, solJefe.fechaFin)) + solJefe.movilizacion + solJefe.gastosInstalacion + solJefe.gastosMateriales + solJefe.cajaChica;
    if (solPersonal) {
      sugerido += (solPersonal.equipo || []).reduce((a, p) => a + (p.tarifaAlimentacionDia * diasEntre(p.fechaInicio, p.fechaFin)) + p.moviViaje + p.moviInterna, 0);
      sugerido += (solPersonal.externos || []).reduce((a, p) => a + (p.diasNecesarios * p.costoPorDia), 0);
    }

    const datos = previa || {
      fechaSolicitud: new Date().toISOString().slice(0, 10),
      motivoDelViaje: proyecto.motivoViaje || '',
      terrestre: true, aereo: false, propio: false,
      nombreSolicitante: config.nombreResponsable || '',
      cedula: config.cedulaResponsable || '',
      departamento: config.departamento || '',
      fechaSalida: proyecto.fechaInicio || '',
      horaSalida: '',
      fechaRegreso: proyecto.fechaFinEstimada || '',
      horaRegreso: '',
      destino: proyecto.ciudad || '',
      idaYVuelta: 'SI',
      requiereHotel: 'SI',
      gastoSolicitado: sugerido || 0,
      observaciones: proyecto.motivoViaje || '',
    };

    const modal = abrirModal({
      titulo: 'Solicitud formal de viáticos',
      contenidoHtml: `
        <div class="field"><label>Fecha de la solicitud</label><input type="date" id="s3-fecha" value="${datos.fechaSolicitud}" /></div>
        <div class="field"><label>Motivo del viaje</label><input type="text" id="s3-motivo" value="${datos.motivoDelViaje}" /></div>
        <div class="field">
          <label>Transporte</label>
          <div style="display:flex; gap:16px;">
            <label style="display:flex; align-items:center; gap:6px; font-weight:400;"><input type="checkbox" id="s3-terrestre" ${datos.terrestre ? 'checked' : ''} /> Terrestre</label>
            <label style="display:flex; align-items:center; gap:6px; font-weight:400;"><input type="checkbox" id="s3-aereo" ${datos.aereo ? 'checked' : ''} /> Aéreo</label>
            <label style="display:flex; align-items:center; gap:6px; font-weight:400;"><input type="checkbox" id="s3-propio" ${datos.propio ? 'checked' : ''} /> Propio</label>
          </div>
        </div>

  __modules__['storage/backup'] = (function(){
  const { db } = __modules__['storage/db'];


  const STORES_A_RESPALDAR = [
    'proyectos', 'ingresos', 'gastos', 'proyecciones', 'papelera', 'papeleraIngresos',
    'plantillas', 'categorias', 'configuracion', 'comprobantes', 'solicitudesViaticos',
  ];

  function blobABase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function base64ABlob(dataUrl) {
    return fetch(dataUrl).then((r) => r.blob());
  }

  /**
   * Genera un archivo .json con todos los datos del sistema (proyectos, gastos,
   * ingresos, comprobantes con sus fotos, categorías, plantillas, configuración).
   * Este archivo se puede transferir manualmente entre dispositivos (celular,
   * computadora) mediante AirDrop, correo, Drive, etc. — no hay sincronización
   * automática en la nube porque esta app no tiene servidor propio.
   */
  async function exportarRespaldo() {
    const datos = {};
    for (const store of STORES_A_RESPALDAR) {
      const registros = await db.getAll(store);
      if (store === 'comprobantes') {
        datos[store] = await Promise.all(registros.map(async (r) => ({
          ...r,
          imagenBlob: r.imagenBlob ? await blobABase64(r.imagenBlob) : null,
          miniaturaBlob: r.miniaturaBlob ? await blobABase64(r.miniaturaBlob) : null,
        })));
      } else {
        datos[store] = registros;
      }
    }

    const paquete = {
      tipo: 'respaldo-viaticos',
      version: 1,
      generadoEn: new Date().toISOString(),
      datos,
    };

    const blob = new Blob([JSON.stringify(paquete)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `viaticos-respaldo-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  /**
   * Restaura un archivo de respaldo generado por exportarRespaldo().
   * Reemplaza los datos existentes con los del archivo (pensado para mover
   * todo de un dispositivo a otro, no para fusionar).
   */
  async function importarRespaldo(archivo) {
    const texto = await archivo.text();
    const paquete = JSON.parse(texto);
    if (paquete?.tipo !== 'respaldo-viaticos') {
      throw new Error('Este archivo no parece ser un respaldo válido de Viáticos.');
    }

    for (const store of STORES_A_RESPALDAR) {
      const registros = paquete.datos[store] || [];
      await db.clear(store);
      for (const registro of registros) {
        if (store === 'comprobantes') {
          const restaurado = {
            ...registro,
            imagenBlob: registro.imagenBlob ? await base64ABlob(registro.imagenBlob) : null,
            miniaturaBlob: registro.miniaturaBlob ? await base64ABlob(registro.miniaturaBlob) : null,
          };
          await db.put(store, restaurado);
        } else {
          await db.put(store, registro);
        }
      }
    }

    return paquete.generadoEn;
  }

  return { exportarRespaldo, importarRespaldo };
  })();

  /** Reúne todo lo que un informe podría necesitar mostrar sobre un proyecto. */
  async function reunirDatosInforme(proyectoId) {
    const [proyecto, ingresos, gastos, resumen, proyeccionItems, proyectadoCat, categorias] = await Promise.all([
      obtenerProyecto(proyectoId),
      ingresosDeProyecto(proyectoId),
      gastosDeProyecto(proyectoId),
      resumenFinancieroProyecto(proyectoId),
      listarProyeccion(proyectoId),
      proyectadoPorCategoria(proyectoId),
      listarCategorias(),
    ]);

    const gastosOrdenados = gastos.slice().sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
    const numeradosBase = gastosOrdenados.map((g, i) => ({ ...g, numero: i + 1 }));

    // Enriquecer cada gasto con los datos detectados de su comprobante (RUC, N.º factura,
    // establecimiento, subtotal/IVA/total), si existen. Nunca sobrescribe el valor real
    // del gasto — solo agrega estos campos informativos adicionales.
    const numerados = await Promise.all(numeradosBase.map(async (g) => {
      if (!g.comprobanteId) return g;
      const comprobante = await db.get('comprobantes', g.comprobanteId);
      const d = comprobante?.datosDetectados;
      if (!d) return g;
      return {
        ...g,
        establecimiento: d.establecimiento || null,
        ciudad: d.ciudad || null,
        ruc: d.ruc || null,
        numeroFactura: d.numeroFactura || null,
        subtotalComprobante: d.subtotal ?? null,
        ivaComprobante: d.iva ?? null,
        totalComprobante: d.total ?? null,
      };
    }));

    const realPorCategoria = agruparGastosPorCategoria(gastos);
    const config = (await db.get('configuracion', 'general')) || {};

    return {
      proyecto,
      ingresos,
      gastos: numerados,
      resumen,
      proyeccionItems,
      proyectadoCat,
      realPorCategoria,
      categorias,
      empresa: {
        nombre: config.nombreEmpresa || '',
        responsable: config.nombreResponsable || '',
        cargo: config.cargo || '',
        moneda: config.moneda || 'USD',
        logo: config.logo || null,
      },
    };
  }

  return { reunirDatosInforme };

      }
      if (!g.comprobanteId) continue;
      const comp = await db.get('comprobantes', g.comprobanteId);
      if (!comp?.imagenBlob) continue;
      conFoto.push({ gasto: g, url: blobAUrl(comp.imagenBlob), etiqueta: null });
    }
    if (!conFoto.length) return '';

    // Ya vienen ordenados por número (mismo orden del informe); se agrupan de a POR_PAGINA por hoja
    const paginas = [];
    for (let i = 0; i < conFoto.length; i += POR_PAGINA) {

                  <div class="proj-card-client">${p.cliente || 'Sin cliente'} · ${p.ciudad || 'Sin ciudad'}</div>
                </div>
                <span class="state-tag state-${p.estado}">${ETIQUETAS_ESTADO_PROYECTO[p.estado]}</span>
              </div>
            </a>
          `).join('')}
        </div>
      ` : `<div class="empty-state"><p class="lead">Aún no hay proyectos</p><p>Crea un proyecto y registra gastos antes de generar un informe.</p></div>`}
    `;
  }

  async function renderPasoTipo(contenedor, { proyecto, onElegir }) {
    const historial = (await listarHistorial(proyecto.id)).filter((h) => h.tipo === 'informe');

    contenedor.innerHTML = `
      <a href="#informes" class="btn btn-ghost btn-sm" style="margin-bottom:var(--sp-3);">${icono('flechaAtras')} Volver a proyectos</a>
      <h1 style="font-family:var(--font-display); font-size:var(--fs-xl); font-weight:600; margin-bottom:var(--sp-2);">Generar informe — ${proyecto.nombre}</h1>
      <p style="color:var(--text-500); font-size:var(--fs-sm); margin-bottom:var(--sp-5);">Elige el tipo de informe que quieres generar.</p>
      <div class="proj-grid">
        ${TIPOS.map((t) => `
          <button class="proj-card" style="text-align:left; width:100%; border:1px solid var(--line);" data-tipo="${t.id}">
            <div class="proj-card-title">${t.titulo}</div>
            <p style="font-size:var(--fs-sm); color:var(--text-500);">${t.desc}</p>
          </button>
        `).join('')}
      </div>

      <div class="section-title" style="margin-top:var(--sp-6);">Informes ya generados (respaldo permanente)</div>
      <div class="card card-elevated">
        ${historial.length ? historial.map((h) => `
          <div class="proj-row">
            <div>
              <div class="proj-name">${h.titulo}</div>
              <div class="proj-meta">${new Date(h.fechaGeneracion).toLocaleString('es-EC', { dateStyle: 'medium', timeStyle: 'short' })}${h.resumen ? ` · Recibido ${formatoMoneda(h.resumen.totalRecibido)} · Gastado ${formatoMoneda(h.resumen.totalGastado)}` : ''}</div>
            </div>
            <div style="display:flex; gap:6px;">
              <button class="btn btn-secondary btn-sm" data-ver-informe="${h.id}">Ver / Reimprimir</button>
              <button class="btn btn-ghost btn-sm" data-eliminar-informe="${h.id}" style="color:var(--danger);">Eliminar</button>
            </div>
          </div>
        `).join('') : `<div class="empty-state"><p class="lead">Aún no has generado ningún informe de este proyecto</p></div>`}
      </div>
    `;
    contenedor.querySelectorAll('[data-tipo]').forEach((btn) => {
      btn.addEventListener('click', () => onElegir(btn.dataset.tipo));
    });
    contenedor.querySelectorAll('[data-ver-informe]').forEach((btn) => btn.addEventListener('click', () => {
      const registro = historial.find((h) => h.id === btn.dataset.verInforme);
      if (registro) imprimirContenido(registro.htmlSnapshot);
    }));
    contenedor.querySelectorAll('[data-eliminar-informe]').forEach((btn) => btn.addEventListener('click', () => {
      abrirModal({
        titulo: '¿Eliminar este informe del historial?',
        contenidoHtml: `<p>Esta acción no se puede deshacer.</p>`,
        botones: [
          { texto: 'Cancelar', clase: 'btn-secondary' },
          { texto: 'Eliminar', clase: 'btn-danger', onClick: async () => { await eliminarDelHistorial(btn.dataset.eliminarInforme); mostrarToast('Eliminado del historial.'); renderPasoTipo(contenedor, { proyecto, onElegir }); } },
        ],
      });
    }));
  }

  /** Imprime (y por tanto permite "Guardar en PDF" / compartir) el contenido dado, usando la zona de impresión dedicada. */
  function imprimirContenido(html) {
    const zona = document.getElementById('zona-impresion');
    zona.innerHTML = html;
    // Pequeño respiro para que el navegador pinte las imágenes antes de abrir el diálogo de impresión
    setTimeout(() => window.print(), 150);
  }

  function renderPasoVistaPrevia(contenedor, { datos, config, onVolverConfig }) {
    contenedor.innerHTML = `
      <div class="toolbar">
        <div class="section-title" style="margin-bottom:0;">Vista previa del informe</div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-secondary" id="btn-volver-config">Volver a configuración</button>
          <button class="btn btn-primary" id="btn-generar-pdf">Generar PDF</button>
        </div>
      </div>
      ${renderVistaPreviaHTML(datos, config)}
    `;
    contenedor.querySelector('#btn-volver-config').addEventListener('click', onVolverConfig);

    contenedor.querySelector('#btn-generar-pdf').addEventListener('click', () => {
      const modal = abrirModal({
        titulo: '¿Cómo deseas manejar los comprobantes?',
        contenidoHtml: `
          <div style="display:flex; flex-direction:column; gap:12px;">
            <label style="display:flex; gap:10px; align-items:flex-start; font-size:var(--fs-sm);">
              <input type="radio" name="modo-comp" value="sin" checked style="margin-top:3px;" />
              <span><strong>Sin comprobantes</strong><br><span style="color:var(--text-500);">Solo el informe, sin fotos anexas.</span></span>
            </label>
            <label style="display:flex; gap:10px; align-items:flex-start; font-size:var(--fs-sm);">
              <input type="radio" name="modo-comp" value="mismo" style="margin-top:3px;" />
              <span><strong>Informe + comprobantes en el mismo PDF</strong><br><span style="color:var(--text-500);">Cada foto se agrega al final, identificada con el número del gasto.</span></span>
            </label>
            <label style="display:flex; gap:10px; align-items:flex-start; font-size:var(--fs-sm);">
              <input type="radio" name="modo-comp" value="separado" style="margin-top:3px;" />
              <span><strong>Generar por separado</strong><br><span style="color:var(--text-500);">Primero guardas/imprimes el informe y, en un segundo paso, las fotos de los comprobantes.</span></span>
            </label>
          </div>
          <p style="font-size:var(--fs-xs); color:var(--text-500); margin-top:var(--sp-3);">
            Se abrirá el diálogo de impresión de tu navegador — desde ahí eliges "Guardar en PDF" o "Guardar en Archivos" para obtener el archivo en tu celular.
          </p>
        `,
        botones: [
          { texto: 'Cancelar', clase: 'btn-secondary' },
          {
            texto: 'Continuar', clase: 'btn-primary', cerrar: false,
            onClick: async () => {
              const modo = modal.querySelector('input[name="modo-comp"]:checked').value;
              const gastosFiltrados = filtrarGastosInforme(datos.gastos, config);
              cerrarModal();

              const htmlInforme = renderVistaPreviaHTML(datos, config);
              await guardarEnHistorial(datos.proyecto.id, {
                tipo: 'informe',
                titulo: `Informe ${config.tipo} de viáticos`,
                htmlSnapshot: htmlInforme,
                resumen: { totalRecibido: datos.resumen.totalRecibido, totalGastado: datos.resumen.totalGastado, saldo: datos.resumen.saldo },
              });

              if (modo === 'sin') {
                imprimirContenido(htmlInforme);
              } else if (modo === 'mismo') {
                mostrarToast('Preparando comprobantes…');
                const anexo = await construirAnexoComprobantesHTML(gastosFiltrados);
                imprimirContenido(htmlInforme + anexo);
              } else {
                // Por separado: primero el informe. Los comprobantes se ofrecen después, en un segundo botón.
                imprimirContenido(htmlInforme);
                mostrarToast('Guarda/imprime el informe. Cuando termines, usa "Imprimir comprobantes" para el segundo archivo.');
                const btnAnexo = contenedor.querySelector('#btn-generar-pdf');
                if (btnAnexo && !contenedor.querySelector('#btn-imprimir-anexo')) {
                  const nuevoBtn = document.createElement('button');
                  nuevoBtn.className = 'btn btn-secondary';
                  nuevoBtn.id = 'btn-imprimir-anexo';
                  nuevoBtn.textContent = 'Imprimir comprobantes';
                  nuevoBtn.addEventListener('click', async () => {
                    mostrarToast('Preparando comprobantes…');
                    const anexo = await construirAnexoComprobantesHTML(gastosFiltrados);
                    imprimirContenido(anexo);
                  });
                  btnAnexo.insertAdjacentElement('afterend', nuevoBtn);
                }
              }
            },
          },
        ],
      });
    });
  }

  async function renderInformes(contenedor, params) {
    if (!params?.id) {
      await renderListaProyectos(contenedor);
      return;
    }

    const datos = await reunirDatosInforme(params.id);
    if (!datos.proyecto) {
      contenedor.innerHTML = `<div class="empty-state"><p class="lead">Proyecto no encontrado</p></div>`;
      return;
    }

    const irAPasoTipo = () => renderPasoTipo(contenedor, { proyecto: datos.proyecto, onElegir: irAPasoConfig });

    const irAPasoConfig = async (tipo) => {
      const config = await configPorDefecto(tipo, datos.gastos, datos.categorias);
      await renderPasoConfiguracion(contenedor, {
        config,
        gastos: datos.gastos,
        categorias: datos.categorias,
        onVolver: irAPasoTipo,
        onVerVistaPrevia: (cfgFinal) => renderPasoVistaPrevia(contenedor, {
          datos,
          config: cfgFinal,
          onVolverConfig: () => irAPasoConfig(cfgFinal.tipo),
        }),
      });
    };

    irAPasoTipo();
  }

  return { renderInformes };
  })();

  // ==== app ====
  (function(){
  const { registrarRuta, definirContenedor, alNavegar, iniciarRouter } = __modules__['core/router'];
  const { renderSidebar, renderBottomNav, marcarRutaActiva, actualizarTopbar } = __modules__['components/nav'];
  const { renderDashboard } = __modules__['modules/dashboard/dashboard.view'];
  const { registrarRutasProyectos } = __modules__['modules/proyectos/index'];
  const { renderConfiguracion } = __modules__['modules/configuracion/configuracion.view'];
  const { renderInformes } = __modules__['modules/informes/informes.view'];
  const { iniciarEscuchaDeConexion } = __modules__['modules/comprobantes/cola.service'];








  function mostrarErrorFatal(err) {
    console.error('Error fatal al iniciar la app', err);
    const vista = document.getElementById('vista') || document.body;
    vista.innerHTML = `
      <div class="empty-state" style="padding:48px 16px;">
        <p class="lead" style="color:var(--danger, #e0685f);">La aplicación no pudo iniciar correctamente</p>
        <p>${(err && err.message) || 'Error desconocido'}</p>
        <p style="font-size:0.75rem; color:var(--text-500, #888); margin-top:12px;">Toma una captura de esta pantalla completa (incluyendo este mensaje) para reportarlo.</p>
      </div>
    `;
  }

  function iniciar() {
    try {
      renderSidebar();
      renderBottomNav();

      definirContenedor(document.getElementById('vista'));
      alNavegar((patron) => {
        marcarRutaActiva(patron);
        actualizarTopbar(patron);
      });

      registrarRuta('dashboard', renderDashboard);
      registrarRutasProyectos();
      registrarRuta('configuracion', renderConfiguracion);
      registrarRuta('informes', renderInformes);
      registrarRuta('informes/:id', renderInformes);

      iniciarRouter();
      iniciarEscuchaDeConexion();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {
          // Si falla el registro (p.ej. entorno de vista previa sin HTTPS),
          // la app sigue funcionando, solo sin capacidad offline.
        });
      }
    } catch (err) {
      mostrarErrorFatal(err);
    }
  }

  // Red de seguridad: cualquier error no capturado en cualquier parte de la app
  // (incluyendo promesas rechazadas sin .catch) se muestra en pantalla en vez
  // de dejar la app en blanco silenciosamente.
  window.addEventListener('error', (event) => mostrarErrorFatal(event.error || new Error(event.message)));
  window.addEventListener('unhandledrejection', (event) => mostrarErrorFatal(event.reason || new Error('Promesa rechazada sin manejar')));

  document.addEventListener('DOMContentLoaded', iniciar);

  })();

})();

  </script>
